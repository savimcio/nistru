name: Feature request
description: Propose a new capability or a change to an existing one.
title: "feat: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Lead with the problem, not the solution. Many requests dissolve once the underlying need is clear.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what's in the way today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Concrete UX / API sketches welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What else did you try or think about, and why did those fall short?

  - type: dropdown
    id: scope
    attributes:
      label: Area
      options:
        - editor core
        - plugin system
        - SDK (plugsdk)
        - docs
        - build / CI
        - other
    validations:
      required: true
